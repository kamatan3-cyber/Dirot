        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
    );
  }

  function TrashIcon() {
    return (
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/>
        <path d="M9 6V4h6v2"/>
      </svg>
    );
  }

  function StarIcon({ filled }) {
    return filled
      ? <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      : <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>;
  }

  // ── App ───────────────────────────────────────────────────────
  function App() {
    const [screen,           setScreen]           = useState('home');
    const [navKey,           setNavKey]           = useState(0);
    const [navDir,           setNavDir]           = useState('forward');
    const [apts,             setApts]             = useState(loadApts);
    const [settings,         setSettings]         = useState(loadSettings);
    const [editing,          setEditing]          = useState(null);
    const [favFilter,        setFavFilter]        = useState(false);
    const [gallery,          setGallery]          = useState(null);
    const [mapApt,           setMapApt]           = useState(null);
    const [compareIds,       setCompareIds]       = useState([]);
    const [compareView,      setCompareView]      = useState(false);
    const [profileApt,       setProfileApt]       = useState(null);
    const [sortMode,         setSortMode]         = useState('score');
    const [allMapOpen,       setAllMapOpen]       = useState(false);
    const [photoCompareParam, setPhotoCompareParam] = useState(null);

    useEffect(() => { saveApts(apts); }, [apts]);

    const { weights, vfmWeights, cntScores } = settings;

    function nav(s, dir = 'forward') {
      setNavDir(dir);
      setNavKey(k => k + 1);
      setFavFilter(false); setCompareView(false); setCompareIds([]); setScreen(s);
    }

    function goBack() {
      if (screen === 'edit-form') { setEditing(null); nav('ranking', 'back'); }
      else if (screen === 'profile') { setProfileApt(null); nav('ranking', 'back'); }
      else nav('home', 'back');
    }

    function saveNew(data) {
      const now = Date.now();
      setApts(prev => [{ id: uid(), ...data, createdAt: now, updatedAt: now, history: [], favorite: false }, ...prev]);
      nav('home');
    }

    function saveEdit(data) {
      setApts(prev => prev.map(a => a.id === editing.id ? { ...a, ...data, updatedAt: Date.now() } : a));
      setEditing(null); nav('ranking');
    }

    function deleteApt(id) {
      if (window.confirm('האם למחוק את הדירה? פעולה זו בלתי הפיכה.'))
        setApts(prev => prev.filter(a => a.id !== id));
    }

    function toggleFav(id) {
      setApts(prev => prev.map(a => a.id === id ? { ...a, favorite: !a.favorite } : a));
    }

    function openGallery(images, idx) { setGallery({ images, idx: idx || 0 }); }

    function openProfile(apt) { setProfileApt(apt); nav('profile'); }

    function startEdit(apt, e) {
      if (e) e.stopPropagation();
      setEditing(apt); nav('edit-form');
    }

    const menuItems = [
      { label: 'כל הדירות',    onClick: () => nav('ranking') },
      { label: 'השוואת דירות', onClick: () => nav('compare') },
      { label: 'הגדרות',       onClick: () => nav('settings') },
    ];

    const byVfM     = [...apts].sort((a, b) => calcVfM(b, apts, weights, vfmWeights, cntScores) - calcVfM(a, apts, weights, vfmWeights, cntScores));
    const allRanked = [...apts].sort((a, b) => calcScore(b, weights, cntScores) - calcScore(a, weights, cntScores));

    function getSortedApts() {
      const list = [...apts].filter(a => !favFilter || a.favorite);
      if (sortMode === 'score') return list.sort((a, b) => calcScore(b, weights, cntScores) - calcScore(a, weights, cntScores));
      if (sortMode === 'vfm')   return list.sort((a, b) => calcVfM(b, apts, weights, vfmWeights, cntScores) - calcVfM(a, apts, weights, vfmWeights, cntScores));
      if (sortMode === 'price') return list.sort((a, b) => {
        const pa = +(a.price) || Infinity, pb = +(b.price) || Infinity;
        return pa - pb;
      });
      return list;
    }

    function Thumb({ apt, cls, onClick }) {
      return apt.images?.length
        ? <img className={cls} src={apt.images[apt.profIdx || 0]} alt="" onClick={onClick} />
        : <div className={cls + '-ph'} />;
    }

    function ScoreChips({ apt }) {
      const s   = calcScore(apt, weights, cntScores);
      const vfm = calcVfM(apt, apts, weights, vfmWeights, cntScores);
      return (
        <div className="apt-scores">
          <div className="score-chip">
            <span className={'score-chip-val ' + scoreClass(s)}>{s.toFixed(2)}</span>
            <span className="score-chip-lbl">ציון</span>
          </div>
          <div className="score-chip">
            <span className={'score-chip-val ' + scoreClass(vfm)}>{vfm.toFixed(2)}</span>
            <span className="score-chip-lbl">ערך לכסף</span>
          </div>
          {apt.price > 0 && (
            <div className="score-chip">
              <span className="score-chip-val" style={{ fontSize: 13 }}>{fmtPrice(apt.price)}</span>
              <span className="score-chip-lbl">מחיר</span>
            </div>
          )}
        </div>
      );
    }

    const modals = (
      <>
        {gallery    && <GalleryModal images={gallery.images} startIdx={gallery.idx} onClose={() => setGallery(null)} />}
        {mapApt     && <MapModal apt={mapApt} onClose={() => setMapApt(null)} />}
        {allMapOpen && <AllApartmentsMapModal apts={apts} weights={weights} vfmWeights={vfmWeights} cntScores={cntScores} onClose={() => setAllMapOpen(false)} />}
        {photoCompareParam && compareView && (() => {
          const aptA = apts.find(a => a.id === compareIds[0]);
          const aptB = apts.find(a => a.id === compareIds[1]);
          return aptA && aptB ? (
            <PhotoCompareModal
              aptA={aptA} aptB={aptB}
              param={photoCompareParam.param}
              paramLabel={photoCompareParam.label}
              field={photoCompareParam.field}
              onClose={() => setPhotoCompareParam(null)}
            />
          ) : null;
        })()}
      </>
    );

    // ── Home ──
    if (screen === 'home') {
      const top3 = byVfM.slice(0, 3);
      const podiumOrder = top3.length >= 3
        ? [{ apt: top3[1], pos: 2 }, { apt: top3[0], pos: 1 }, { apt: top3[2], pos: 3 }]
        : top3.map((apt, i) => ({ apt, pos: i + 1 }));

      return (
        <div key={navKey} className={'app slide-' + navDir}>
          <AppHeader onAdd={() => nav('add')} menuItems={menuItems} />
          <div className="home-screen screen">
            <div className="home-title">{getGreeting()}</div>
            <div className="home-date">{getHebrewDate()}</div>
            <div className="home-subtitle">מצא את הדירה המושלמת עבורך</div>

            {apts.length === 0 ? (
              <div className="home-empty">
                <div className="home-empty-title">עדיין לא הוספת דירות</div>
                <div className="home-empty-desc">לחץ על + בפינה הימנית העליונה להוספת הדירה הראשונה</div>
              </div>
            ) : (
              <div className="podium-section">
                <div className="podium-label">דירוג ערך לכסף — מקומות ראשונים</div>
                <div className="podium-wrap">
                  {podiumOrder.map(({ apt, pos }, idx) => {
                    const score = calcScore(apt, weights, cntScores);
                    return (
                      <div key={apt.id} className={'podium-card pos-' + pos + ' stagger-item'}
                        style={{ '--stagger-delay': `${idx * 70}ms` }}
                        onClick={() => openProfile(apt)}>
                        <div className={'podium-badge rank-' + pos}>{pos}</div>
                        {apt.images?.length
                          ? <img className="podium-img" src={apt.images[apt.profIdx || 0]} alt="" />
                          : <div className="podium-img-ph" />
                        }
                        <div className="podium-info">
                          <div className="podium-name">{apt.name || fullAddress(apt)}</div>
                          <div className={'podium-score ' + scoreClass(score)}>{score.toFixed(2)}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {apts.length > 0 && (
              <button className="view-all-btn stagger-item"
                style={{ '--stagger-delay': `${Math.min(apts.length, 3) * 70}ms` }}
                onClick={() => nav('ranking')}>
                כל הדירות ({apts.length})
              </button>
            )}
          </div>
          {modals}
        </div>
      );
    }

    // ── Add ──
    if (screen === 'add') {
      return (
        <div key={navKey} className={'app slide-' + navDir}>
          <AppHeader title="הוספת דירה חדשה" onBack={goBack} onHome={() => nav('home', 'back')} />
          <ApartmentForm onSave={saveNew} />
          {modals}
        </div>
      );
    }

    // ── Edit form ──
    if (screen === 'edit-form') {
      return (
        <div key={navKey} className={'app slide-' + navDir}>
          <AppHeader title="עריכת דירה" onBack={goBack} onHome={() => nav('home', 'back')} />
          <ApartmentForm initial={editing} onSave={saveEdit} />
          {modals}
        </div>
      );
    }

    // ── Profile ──
    if (screen === 'profile' && profileApt) {
      const apt        = apts.find(a => a.id === profileApt.id) || profileApt;
      const score      = calcScore(apt, weights, cntScores);
      const vfm        = calcVfM(apt, apts, weights, vfmWeights, cntScores);
      const priceScore = calcPriceScore(apt);

      return (
        <div key={navKey} className={'app slide-' + navDir}>
          <AppHeader title={apt.name || fullAddress(apt)} onBack={goBack} onHome={() => nav('home', 'back')} />
          <div className="screen profile-screen">
            {apt.images?.length ? (
              <div className="profile-hero">
                <img className="profile-hero-img" src={apt.images[apt.profIdx || 0]} alt="" />
                <div className="profile-hero-fade" />
              </div>
            ) : (
              <div className="profile-hero-ph" />
            )}

            <div className="profile-body">
              <div className="profile-name">{apt.name || fullAddress(apt)}</div>
              {(apt.street || apt.city || (!apt.street && !apt.city && apt.address)) && (
                <div className="profile-address">
                  {apt.street && <div>{apt.street}</div>}
                  {apt.city && <div>{apt.city}</div>}
                  {!apt.street && !apt.city && apt.address && <div>{apt.address}</div>}
                </div>
              )}

              <div className="profile-scores stagger-item" style={{ '--stagger-delay': '40ms' }}>
                <div className={'score-circle ' + scoreClass(score)}>
                  <div className="score-circle-num">{score.toFixed(2)}</div>
                  <div className="score-circle-lbl">ציון סופי</div>
                </div>
                <div className="profile-score-item">
                  <div className={'profile-score-num ' + scoreClass(vfm)}>{vfm.toFixed(2)}</div>
                  <div className="profile-score-lbl">ערך לכסף</div>
                </div>
                {priceScore !== null && (
                  <div className="profile-score-item">
                    <div className={'profile-score-num ' + scoreClass(priceScore)}>{priceScore}</div>
                    <div className="profile-score-lbl">ציון מחיר</div>
                  </div>
                )}
              </div>

              <div className="profile-section stagger-item" style={{ '--stagger-delay': '100ms' }}>
                <div className="form-section-title">פרטים</div>
                {apt.street && (
                  <div className="profile-detail-row">
                    <span className="profile-detail-label">רחוב ומספר</span>
                    <span className="profile-detail-val">{apt.street}</span>
                  </div>
                )}
                {apt.city && (
                  <div className="profile-detail-row">
                    <span className="profile-detail-label">עיר</span>
                    <span className="profile-detail-val">{apt.city}</span>
                  </div>
                )}
                {!apt.street && !apt.city && apt.address && (
                  <div className="profile-detail-row">
                    <span className="profile-detail-label">כתובת</span>
                    <span className="profile-detail-val">{apt.address}</span>
                  </div>
                )}
                {apt.price > 0 && (
                  <div className="profile-detail-row">
                    <span className="profile-detail-label">מחיר חודשי</span>
                    <span className="profile-detail-val">{fmtPrice(apt.price)}</span>
                  </div>
                )}
                {apt.visitDate && (
                  <div className="profile-detail-row">
                    <span className="profile-detail-label">תאריך ביקור</span>
                    <span className="profile-detail-val">{apt.visitDate}</span>
                  </div>
                )}
                <div className="profile-detail-row">
                  <span className="profile-detail-label">מספר דיירים</span>
                  <span className="profile-detail-val">{apt.roommatesCount}</span>
                </div>
                {apt.notes && (
                  <div style={{ marginTop: 10, fontSize: 14, color: 'var(--text-secondary)', lineHeight: 1.6 }}>
                    {apt.notes}
                  </div>
                )}
              </div>

              <div className="profile-section stagger-item" style={{ '--stagger-delay': '165ms' }}>
                <div className="form-section-title">דירוגים</div>
                {[
                  ['חדר',           apt.room],
                  ['סלון + מרפסת', apt.living],
                  ['מטבח',         apt.kitchen],
                  ['מיקום',        apt.location],
                  ['איכות דיירים', apt.roommatesQuality],
                ].map(([label, val]) => (
                  <div key={label} className="profile-detail-row">
                    <span className="profile-detail-label">{label}</span>
                    <div className="param-bar-wrap">
                      <div className="param-bar">
                        <div className={'param-bar-fill ' + scoreClass(val || 0)}
                          style={{ width: ((val || 0) / 5 * 100) + '%' }} />
                      </div>
                      <span className={'profile-detail-val ' + scoreClass(val || 0)}>{val}/5</span>
                    </div>
                  </div>
                ))}
              </div>

              <button className="stagger-item"
                style={{ width: '100%', marginTop: '8px', '--stagger-delay': '230ms',
                         fontFamily: 'var(--font-heading)', fontSize: 15, fontWeight: 700 }}
                onClick={() => startEdit(apt)}>
                עריכת דירה
              </button>
            </div>

            {apt.images?.length > 0 && (
              <div>
                <div style={{ padding: '0 20px 8px', fontSize: 11, fontWeight: 700, color: 'var(--text-tertiary)', textTransform: 'uppercase', letterSpacing: 1 }}>
                  תמונות
                </div>
                <div className="profile-photos-row">
                  {apt.images.map((src, i) => {
                    const tag      = (apt.imageTags || [])[i] || '';
                    const tagEntry = ROOM_TAGS.find(t => t.value === tag);
                    const tagLabel = tagEntry && tag !== '' ? tagEntry.label : '';
                    return (
                      <div key={i} className="profile-photo-item" onClick={() => openGallery(apt.images, i)}>
                        <img className="profile-photo-img" src={src} alt="" />
                        {tagLabel && <div className="profile-photo-tag">{tagLabel}</div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
          {modals}
        </div>
      );
    }

    // ── All Apartments (ranking) ──
    if (screen === 'ranking') {
      const sorted = getSortedApts();
      return (
        <div key={navKey} className={'app slide-' + navDir}>
          <AppHeader title="כל הדירות" onBack={goBack} onAdd={() => nav('add')} onHome={() => nav('home', 'back')} />
          <div className="screen">
            <div className="list-toolbar">
              <button className={'toolbar-btn' + (favFilter ? ' active' : '')}
                onClick={() => setFavFilter(f => !f)}>
                {favFilter ? 'כל הדירות' : 'מועדפים בלבד'}
              </button>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                {[
                  { mode: 'score', label: 'ציון סופי' },
                  { mode: 'vfm',   label: 'ערך לכסף' },
                  { mode: 'price', label: 'מחיר' },
                ].map(({ mode, label }) => (
                  <button key={mode}
                    className={'toolbar-btn' + (sortMode === mode ? ' active' : '')}
                    onClick={() => setSortMode(mode)}>
                    {label}
                  </button>
                ))}
              </div>
              {apts.length > 0 && (
                <button className="toolbar-btn" onClick={() => setAllMapOpen(true)}>
                  הצג על המפה
                </button>
              )}
            </div>

            {sorted.length === 0
              ? <div className="empty">
                  <div className="empty-title">{favFilter ? 'אין דירות מועדפות' : 'אין דירות'}</div>
                  <div className="empty-desc">הוסף דירות כדי לראות את הרשימה</div>
                </div>
              : <div className="apt-list">
                  {sorted.map((apt, i) => {
                    const score = calcScore(apt, weights, cntScores);
                    const vfm   = calcVfM(apt, apts, weights, vfmWeights, cntScores);
                    return (
                      <div className={'rank-card stagger-item ' + borderClass(score)} key={apt.id}
                        style={{ cursor: 'pointer', '--stagger-delay': `${Math.min(i, 7) * 55}ms` }}
                        onClick={() => openProfile(apt)}>
                        <div className="apt-card-row">
                          {apt.images?.length
                            ? <img className="apt-thumb-sm" src={apt.images[apt.profIdx || 0]} alt=""
                                onClick={e => { e.stopPropagation(); openGallery(apt.images, apt.profIdx || 0); }} />
                            : <div className="apt-thumb-ph-sm" />
                          }
                          <div className="rank-info">
                            <div className="apt-name-row">
                              {apt.favorite && <span className="fav-badge">מועדף</span>}
                              <span className="rank-name">{apt.name || fullAddress(apt)}</span>
                              <div className="apt-scores-inline">
                                <span className={'apt-score-val ' + scoreClass(score)} title="ציון">{score.toFixed(1)}</span>
                                <span className="apt-score-sep">·</span>
                                <span className={'apt-score-val ' + scoreClass(vfm)} style={{ fontSize: 11 }} title="ערך לכסף">{vfm.toFixed(1)}</span>
                              </div>
                            </div>
                            {(apt.street || apt.city || apt.address) && (
                              <div className="rank-addr">
                                {apt.street && <div className="rank-addr-line">{apt.street}</div>}
                                {apt.city && <div className="rank-addr-line">{apt.city}</div>}
                                {!apt.street && !apt.city && apt.address && <div className="rank-addr-line">{apt.address}</div>}
                              </div>
                            )}
                            {(apt.price > 0 || apt.visitDate) && (
                              <div className="rank-meta">
                                {apt.price > 0 ? fmtPrice(apt.price) + (apt.visitDate ? ' · ' : '') : ''}
                                {apt.visitDate ? `ביקור: ${apt.visitDate}` : ''}
                              </div>
                            )}
                          </div>
                          <div className="rank-pos-sm">{i + 1}</div>
                        </div>
                        <div className="apt-actions-bar" onClick={e => e.stopPropagation()}>
                          <button className={'card-icon-btn' + (apt.favorite ? ' fav-on' : '')}
                            onClick={() => toggleFav(apt.id)}
                            title={apt.favorite ? 'הסר ממועדפים' : 'הוסף למועדפים'}>
                            <StarIcon filled={apt.favorite} />
                          </button>
                          <button className="card-icon-btn" title="ערוך דירה" onClick={e => startEdit(apt, e)}>
                            <PencilIcon />
                          </button>
                          <button className="card-icon-btn" onClick={() => setMapApt(apt)} title="מפה">
                            <MapPinIcon />
                          </button>
                          <button className="card-icon-btn" onClick={() => shareWhatsApp(apt, score, vfm)} title="שתף">
                            <ShareIcon />
                          </button>
                          <button className="card-icon-btn danger" onClick={e => { e.stopPropagation(); deleteApt(apt.id); }} title="מחק">
                            <TrashIcon />
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
            }
          </div>
          {modals}
        </div>
      );
    }

    // ── Compare ──
    if (screen === 'compare') {
      const twoSelected = compareIds.length === 2;

      if (!compareView) {
        return (
          <div key={navKey} className={'app slide-' + navDir}>
            <AppHeader title="השוואת דירות" onBack={goBack} onHome={() => nav('home', 'back')} />
            <div className="compare-screen screen">
              {apts.length < 2
                ? <div className="empty">
                    <div className="empty-title">נדרשות לפחות שתי דירות</div>
                    <div className="empty-desc">הוסף עוד דירות כדי להשוות</div>
                  </div>
                : <>
                    <div style={{ fontSize: 12, color: 'var(--text-tertiary)', fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase', marginBottom: 12 }}>
                      בחר שתי דירות להשוואה ({compareIds.length}/2)
                    </div>
                    <div className="compare-list">
                      {allRanked.map(apt => {
                        const sel      = compareIds.includes(apt.id);
                        const disabled = !sel && twoSelected;
                        return (
                          <div key={apt.id} className={'compare-item' + (sel ? ' selected' : '')}
                            style={{ opacity: disabled ? 0.4 : 1, cursor: disabled ? 'default' : 'pointer' }}
                            onClick={() => {
                              if (disabled) return;
                              setCompareIds(prev => prev.includes(apt.id)
                                ? prev.filter(id => id !== apt.id)
                                : [...prev, apt.id]);
                            }}>
                            <div className="compare-checkbox">
                              {sel && <span className="compare-checkmark">&#10003;</span>}
                            </div>
                            {apt.images?.length
                              ? <img className="compare-thumb" src={apt.images[apt.profIdx || 0]} alt="" />
                              : <div className="compare-thumb-ph" />
                            }
                            <div className="compare-info">
                              <div className="compare-name">{apt.name || fullAddress(apt)}</div>
                              {fullAddress(apt) && apt.name && <div className="compare-addr-s">{fullAddress(apt)}</div>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <button className="compare-go-btn" disabled={!twoSelected}
                      onClick={() => setCompareView(true)}>השווה</button>
                  </>
              }
            </div>
            {modals}
          </div>
        );
      }

      // Compare side by side
      const [idA, idB] = compareIds;
      const aptA = apts.find(a => a.id === idA);
      const aptB = apts.find(a => a.id === idB);
      const scoreA = calcScore(aptA, weights, cntScores), scoreB = calcScore(aptB, weights, cntScores);
      const vfmA   = calcVfM(aptA, apts, weights, vfmWeights, cntScores);
      const vfmB   = calcVfM(aptB, apts, weights, vfmWeights, cntScores);

      function CCol({ apt, score, vfm, other }) {
        const cs = cntScores || DEFAULT_CNT_SCORES;
        const cntScore = cs[apt.roommatesCount] ?? 3;
        const otherCnt = cs[other.roommatesCount] ?? 3;
        return (
          <div className="compare-col">
            {apt.images?.length
              ? <img className="compare-col-img" src={apt.images[apt.profIdx || 0]} alt="" />
              : <div className="compare-col-img-ph" />
            }
            <div className="compare-col-body">
              <div className="compare-col-name">{apt.name || fullAddress(apt)}</div>
              {apt.name && (apt.street || apt.city || apt.address) && (
                <div className="compare-col-addr">
                  {apt.street && <div>{apt.street}</div>}
                  {apt.city && <div>{apt.city}</div>}
                  {!apt.street && !apt.city && apt.address && <div>{apt.address}</div>}
                </div>
              )}
              <div className={'compare-score-badge ' + scoreClass(score)}>
                ציון: {score.toFixed(2)} / 5
              </div>
              <div className={'compare-score-badge ' + scoreClass(vfm)} style={{ fontSize: 15, display: 'block', marginBottom: 12 }}>
                ערך לכסף: {vfm.toFixed(2)} / 5
              </div>
              {[['room','חדר'],['living','סלון + מרפסת'],['kitchen','מטבח'],['location','מיקום'],['roommatesQuality','איכות דיירים']].map(([f, lbl]) => {
                const mine = apt[f] || 0, theirs = other[f] || 0;
                return (
                  <div key={f} className="compare-param-row">
                    <span className="compare-param-label">{lbl}</span>
                    <span className={'compare-param-val' + (mine > theirs ? ' best' : '')}>{mine}/5</span>
                  </div>
                );
              })}
              <div className="compare-param-row">
                <span className="compare-param-label">מספר דיירים</span>
                <span className={'compare-param-val' + (cntScore > otherCnt ? ' best' : '')}>{apt.roommatesCount}</span>
              </div>
              {(apt.price > 0 || other.price > 0) && (
                <div className="compare-param-row">
                  <span className="compare-param-label">מחיר</span>
                  <span className={'compare-param-val' + (apt.price > 0 && (other.price <= 0 || apt.price < other.price) ? ' best' : '')}>
                    {apt.price > 0 ? fmtPrice(apt.price) : '-'}
                  </span>
                </div>
              )}
              {apt.visitDate && (
                <div className="compare-param-row">
                  <span className="compare-param-label">תאריך ביקור</span>
                  <span className="compare-param-val">{apt.visitDate}</span>
                </div>
              )}
              {apt.notes && (
                <div style={{ marginTop: 10, fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.5 }}>{apt.notes}</div>
              )}
            </div>
          </div>
        );
      }

      function CompareMobileTable() {
        const cs = cntScores || DEFAULT_CNT_SCORES;
        const cntA = cs[aptA.roommatesCount] ?? 3;
        const cntB = cs[aptB.roommatesCount] ?? 3;
        const showPrice = aptA.price > 0 || aptB.price > 0;
        const rows = [
          { label: 'ציון סופי',      a: scoreA.toFixed(2),              b: scoreB.toFixed(2),              aClass: scoreClass(scoreA),                                                     bClass: scoreClass(scoreB),                                                     large: true },
          { label: 'ערך לכסף',       a: vfmA.toFixed(2),                b: vfmB.toFixed(2),                aClass: scoreClass(vfmA),                                                       bClass: scoreClass(vfmB) },
          ...(showPrice ? [{ label: 'מחיר', a: aptA.price > 0 ? fmtPrice(aptA.price) : '–', b: aptB.price > 0 ? fmtPrice(aptB.price) : '–', aClass: aptA.price > 0 && (aptB.price <= 0 || aptA.price < aptB.price) ? 'score-green' : '', bClass: aptB.price > 0 && (aptA.price <= 0 || aptB.price < aptA.price) ? 'score-green' : '' }] : []),
          { label: 'חדר',            a: (aptA.room||0)+'/5',            b: (aptB.room||0)+'/5',            aClass: (aptA.room||0)>(aptB.room||0)?'score-green':'',            bClass: (aptB.room||0)>(aptA.room||0)?'score-green':'' },
          { label: 'סלון + מרפסת',   a: (aptA.living||0)+'/5',          b: (aptB.living||0)+'/5',          aClass: (aptA.living||0)>(aptB.living||0)?'score-green':'',          bClass: (aptB.living||0)>(aptA.living||0)?'score-green':'' },
          { label: 'מטבח',           a: (aptA.kitchen||0)+'/5',         b: (aptB.kitchen||0)+'/5',         aClass: (aptA.kitchen||0)>(aptB.kitchen||0)?'score-green':'',         bClass: (aptB.kitchen||0)>(aptA.kitchen||0)?'score-green':'' },
          { label: 'מיקום',          a: (aptA.location||0)+'/5',        b: (aptB.location||0)+'/5',        aClass: (aptA.location||0)>(aptB.location||0)?'score-green':'',        bClass: (aptB.location||0)>(aptA.location||0)?'score-green':'' },
          { label: 'איכות דיירים',   a: (aptA.roommatesQuality||0)+'/5',b: (aptB.roommatesQuality||0)+'/5',aClass: (aptA.roommatesQuality||0)>(aptB.roommatesQuality||0)?'score-green':'',bClass: (aptB.roommatesQuality||0)>(aptA.roommatesQuality||0)?'score-green':'' },
          { label: 'מספר דיירים',    a: String(aptA.roommatesCount),    b: String(aptB.roommatesCount),    aClass: cntA>cntB?'score-green':'',                                             bClass: cntB>cntA?'score-green':'' },
        ];
        return (
          <div className="compare-mobile-table">
            <div className="cmt-row cmt-header">
              <div className="cmt-label" />
              <div className="cmt-apt-header">
                {aptA.images?.length > 0 && <img src={aptA.images[aptA.profIdx||0]} alt="" className="cmt-thumb" />}
                <span className="cmt-apt-name-text">{aptA.name || fullAddress(aptA)}</span>
              </div>
              <div className="cmt-apt-header">
                {aptB.images?.length > 0 && <img src={aptB.images[aptB.profIdx||0]} alt="" className="cmt-thumb" />}
                <span className="cmt-apt-name-text">{aptB.name || fullAddress(aptB)}</span>
              </div>
            </div>
            {rows.map(({ label, a, b, aClass, bClass, large }) => (
              <div key={label} className="cmt-row">
                <div className="cmt-label">{label}</div>
                <div className={'cmt-val' + (large?' cmt-large':'') + (aClass?' '+aClass:'')}>{a}</div>
                <div className={'cmt-val' + (large?' cmt-large':'') + (bClass?' '+bClass:'')}>{b}</div>
              </div>
            ))}
          </div>
        );
      }

      return (
        <div key={navKey + '-cv'} className={'app slide-forward'}>
          <AppHeader title="השוואת דירות" onBack={() => setCompareView(false)} onHome={() => nav('home', 'back')} />
          <div className="compare-screen screen">
            <div className="compare-view compare-desktop-grid">
              <CCol apt={aptA} score={scoreA} vfm={vfmA} other={aptB} />
              <CCol apt={aptB} score={scoreB} vfm={vfmB} other={aptA} />
            </div>
            <CompareMobileTable />

            <div className="photo-compare-section">
              <div className="form-section-title">השוואת תמונות לפי חדר</div>
              <div className="photo-compare-btns">
                {[
                  { param: 'kitchen', label: 'מטבח',        field: 'kitchen' },
                  { param: 'living',  label: 'סלון ומרפסת', field: 'living'  },
                  { param: 'bedroom', label: 'חדר',          field: 'room'    },
                ].map(p => (
                  <button key={p.param} className="toolbar-btn"
                    onClick={() => setPhotoCompareParam(p)}>
                    {p.label}
                  </button>
                ))}
              </div>
            </div>

            <button className="compare-go-btn" style={{ marginTop: 16 }}
              onClick={() => setCompareView(false)}>בחר דירות אחרות</button>
          </div>
          {modals}
        </div>
      );
    }

    // ── Settings ──
    if (screen === 'settings') {
      return <SettingsScreen key={navKey}
        settings={settings}
        onSave={s => { setSettings(s); saveSettings(s); alert('ההגדרות נשמרו.'); }}
        onBack={goBack}
        navDir={navDir}
        onHome={() => nav('home', 'back')}
      />;
    }

    return null;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(
    <DarkModeProvider><App /></DarkModeProvider>
  );
</script>
</body>
</html>
