<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dirot</title>
  <link rel="icon" type="image/png" href="Dirot2.png" />
  <script>if(localStorage.getItem('dark-mode')==='true')document.documentElement.classList.add('dark');</script>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=Heebo:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { overflow-x: hidden; }

    :root {
      --bg: #F6F6F4;
      --surface: #FFFFFF;
      --border: #E9E9E7;
      --border-strong: #D0D0CE;
      --text: #191919;
      --text-secondary: #6E6E6E;
      --text-tertiary: #ABABAB;
      --accent: #191919;
      --green: #2A7D4F;
      --amber: #C17F24;
      --red: #C0392B;
      --radius: 14px;
      --radius-sm: 9px;
      --radius-xs: 6px;
      --shadow: 0 2px 10px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
      --font-heading: 'Heebo', system-ui, -apple-system, sans-serif;
      --font-body:    'Assistant', system-ui, -apple-system, sans-serif;
      --border-radius-md: 8px;
      --btn-bg: var(--bg);
      --btn-fg: var(--text);
    }

    html.dark {
      --bg: #111112;
      --surface: #1C1C1E;
      --border: #2C2C2E;
      --border-strong: #3C3C3E;
      --text: #F2F2F7;
      --text-secondary: #8E8E93;
      --text-tertiary: #48484A;
      --accent: #E8E8EA;
      --green: #34C77B;
      --amber: #F0A030;
      --red: #E05347;
      --shadow: 0 2px 12px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,0,0,0.25);
    }
    html.dark body { color-scheme: dark; }
    html.dark .compare-item.selected { background: #1A2640; }
    html.dark .compare-checkmark { color: var(--bg); }
    html.dark .fav-badge { background: #22180A; border-color: #5C4818; }
    html.dark .price-warning { background: #22180A; border-color: #5C4818; }
    html.dark .profile-hero-fade { background: linear-gradient(to bottom, transparent, #111112); }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    .app { max-width: 900px; margin: 0 auto; min-height: 100vh; }

    /* ── Heading font (Heebo) applied to large display text ── */
    .home-title, .profile-name,
    .apt-name, .rank-name, .podium-name, .compare-col-name,
    .home-empty-title, .empty-title,
    .rank-score-num, .score-chip-val, .profile-score-num,
    .score-circle-num, .podium-vfm-score, .compare-score-badge,
    .modal-header > span {
      font-family: var(--font-heading);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .screen { /* per-element stagger replaces screen-level animation */ }

    @keyframes staggerUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stagger-item {
      animation: staggerUp 0.28s ease backwards;
      animation-delay: var(--stagger-delay, 0ms);
    }

    /* ── Base button ── */
    button {
      border-radius: var(--border-radius-md);
      background: var(--btn-bg);
      color: var(--btn-fg);
      border: none;
      padding: 12px 28px;
      font-size: 14px;
      font-family: var(--font-body);
      font-weight: 500;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      isolation: isolate;
      transition: opacity 0.15s ease, transform 0.12s ease;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    button:hover:not(:disabled) { opacity: 0.9; }
    button:active:not(:disabled) { transform: scale(0.97); transition: transform 0.06s ease; }
    button:disabled { opacity: 0.35; cursor: default; }

    @keyframes btn-ripple {
      from { transform: translate(-50%,-50%) scale(0); opacity: 1; }
      to   { transform: translate(-50%,-50%) scale(1); opacity: 0; }
    }
    button::after {
      content: ''; pointer-events: none;
      position: absolute; top: 50%; left: 50%;
      width: 200px; height: 200px; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transform: translate(-50%,-50%) scale(0);
      opacity: 0;
    }
    button:active:not(:disabled)::after {
      animation: btn-ripple 0.6s ease-out forwards;
    }

    /* ── Screen slide transitions ── */
    @keyframes slideInRight {
      from { opacity: 0.5; transform: translateX(30px); }
      to   { opacity: 1;   transform: translateX(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0.5; transform: translateX(-30px); }
      to   { opacity: 1;   transform: translateX(0); }
    }
    .slide-forward { animation: slideInRight 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }
    .slide-back    { animation: slideInLeft  0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }

    /* ── App Header ── */
    .app-header {
      position: sticky; top: 0; z-index: 200;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      border-radius: 0 0 16px 16px;
      padding: 0 28px;
      height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      direction: ltr;
      overflow: visible;
      width: 100%;
      box-sizing: border-box;
    }

    .header-brand { flex: 1; display: flex; align-items: center; gap: 12px; min-width: 0; }

    .app-logo { height: 38px; width: auto; object-fit: contain; flex-shrink: 0; cursor: pointer; }

    .header-nav { flex-shrink: 0; display: flex; align-items: center; gap: 8px; }

    .page-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 15px; font-weight: 600; color: var(--text-secondary);
      white-space: nowrap; font-family: var(--font-heading);
      pointer-events: none;
    }

    .icon-btn {
      width: 40px; height: 40px; border-radius: var(--border-radius-md);
      padding: 0; font-size: 18px; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-btn.plus { font-size: 22px; font-weight: 300; }
    .icon-btn.back-arrow { font-size: 16px; }

    .hamburger-wrap { position: relative; flex-shrink: 0; }

    @media (max-width: 768px) {
      .icon-btn { min-width: 44px; min-height: 44px; }
    }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      z-index: 500;
      min-width: 190px;
      max-width: calc(100vw - 32px);
      overflow: hidden;
    }

    .dropdown-item {
      border-radius: 0; display: block; width: 100%;
      padding: 14px 20px; text-align: right;
      background: var(--surface); color: var(--text);
      border-bottom: 1px solid var(--border);
      font-size: 14px; font-weight: 500;
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: var(--bg); opacity: 1; }

    @media (max-width: 480px) {
      .app-header { padding-top: 0; padding-bottom: 0; padding-right: 16px; padding-left: 16px; height: 64px; }
      .app-logo { height: 32px; flex-shrink: 0; }
    }

    /* ── Home ── */
    .home-screen { padding: 48px 24px 80px; }

    .home-title {
      font-size: 38px; font-weight: 800;
      letter-spacing: -1.5px; margin-bottom: 4px;
      color: var(--text); line-height: 1.1;
    }

    .home-date {
      font-size: 13px; color: var(--text-tertiary);
      font-weight: 400; margin-bottom: 10px; letter-spacing: 0.1px;
    }

    .home-subtitle {
      font-size: 16px; color: var(--text-secondary);
      margin-bottom: 36px; font-weight: 400; line-height: 1.5;
    }

    @media (max-width: 480px) {
      .home-screen { padding: 32px 18px 60px; }
      .home-title { font-size: 28px; }
    }

    /* ── Podium ── */
    .podium-section {
      margin-bottom: 28px;
      background: #f5f4f0;
      border-radius: 18px;
      padding: 22px 18px 24px;
    }
    html.dark .podium-section { background: #1a1a1c; }

    .podium-label {
      font-size: 11px; font-weight: 600;
      color: var(--text-tertiary); letter-spacing: 1.2px;
      text-transform: uppercase; margin-bottom: 20px;
    }

    .podium-wrap {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 14px;
      direction: ltr;
    }

    .podium-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
      direction: rtl;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .podium-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
    .podium-card.pos-1 { width: 190px; height: 260px; }
    .podium-card.pos-2 { width: 160px; height: 225px; }
    .podium-card.pos-3 { width: 135px; height: 195px; }

    @media (max-width: 430px) {
      .podium-card.pos-1 { width: 120px; height: 180px; }
      .podium-card.pos-2 { width: 100px; height: 158px; }
      .podium-card.pos-3 { width: 84px;  height: 138px; }
      .podium-wrap { gap: 10px; }
    }

    .podium-badge {
      position: absolute;
      top: 8px; right: 8px;
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; font-family: var(--font-heading);
      color: #fff;
      pointer-events: none;
      z-index: 1;
    }
    .podium-badge.rank-1 { background: #c9a84c; }
    .podium-badge.rank-2 { background: #a0a0a0; }
    .podium-badge.rank-3 { background: #b07d57; }

    .podium-img {
      width: 100%; flex: 1; min-height: 0;
      object-fit: cover; display: block;
      border-radius: 0; margin: 0; border: none;
    }
    .podium-img-ph {
      flex: 1; min-height: 0; width: 100%;
      background: var(--border);
      margin: 0; border-radius: 0;
    }

    .podium-info {
      flex-shrink: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 7px 8px 9px;
      text-align: center;
    }

    .podium-name {
      font-size: 11px; font-weight: 700;
      color: var(--text); margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .podium-score {
      font-size: 17px; font-weight: 800;
      letter-spacing: -0.5px; line-height: 1;
    }

    /* ── View all button ── */
    .view-all-btn {
      display: block; width: 100%;
      padding: 16px 28px; margin-top: 14px;
      font-family: var(--font-heading); font-size: 15px; font-weight: 600;
    }

    .home-empty {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 64px 32px;
      text-align: center;
    }
    .home-empty-title { font-size: 18px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; }
    .home-empty-desc { font-size: 15px; color: var(--text-tertiary); line-height: 1.5; }

    /* ── Form ── */
    .form-screen { padding: 24px 24px 80px; }
    @media (max-width: 480px) { .form-screen { padding: 18px 18px 72px; } }

    .form-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px 24px; margin-bottom: 16px;
    }

    .form-section-title {
      font-size: 11px; font-weight: 600; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 22px;
    }

    .form-label {
      display: block; font-size: 15px; font-weight: 500;
      color: var(--text); margin-bottom: 8px;
    }
    .form-label .req { color: var(--red); margin-right: 2px; }

    .form-input, .form-textarea {
      width: 100%; padding: 12px 14px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-family: inherit; font-size: 15px; color: var(--text);
      background: var(--bg); direction: rtl; outline: none;
      transition: border-color 0.12s; line-height: 1.5;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--text); }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--text-tertiary); }
    .form-textarea { resize: vertical; min-height: 88px; line-height: 1.6; }

    .form-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 16px; margin-bottom: 18px;
    }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

    .price-wrap { position: relative; }
    .price-wrap .form-input { padding-left: 36px; }
    .price-symbol {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px; color: var(--text-tertiary); pointer-events: none;
    }

    .price-warning {
      font-size: 12px; color: var(--amber); margin-top: 6px;
      background: #fffcf3; border: 1px solid #f0d8a0;
      border-radius: var(--radius-xs); padding: 6px 10px;
    }

    /* ── Rating rows ── */
    .rating-row {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 15px 0; border-bottom: 1px solid var(--border); gap: 12px;
    }
    .rating-row:first-of-type { padding-top: 0; }
    .rating-row:last-child { border-bottom: none; padding-bottom: 0; }
    .rating-label { font-size: 15px; font-weight: 500; color: var(--text); white-space: nowrap; }
    .rating-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .rating-btn {
      width: 40px; height: 40px; padding: 0;
      font-family: var(--font-heading); font-size: 14px; font-weight: 700;
    }
    .rating-btn.active { background: var(--btn-fg); color: var(--btn-bg); }
    @media (max-width: 400px) { .rating-btn { width: 34px; height: 34px; font-size: 13px; } }

    /* ── Count buttons ── */
    .count-btns { display: flex; gap: 10px; margin-top: 10px; }
    .count-btn {
      flex: 1; padding: 14px 8px;
      font-family: var(--font-heading); font-size: 20px; font-weight: 800;
      text-align: center;
    }
    .count-btn.active { background: var(--btn-fg); color: var(--btn-bg); }

    /* ── Image upload ── */
    .upload-area {
      border: 2px dashed var(--border); border-radius: var(--radius-sm);
      padding: 26px 20px; text-align: center; cursor: pointer;
      transition: all 0.12s; background: var(--bg);
    }
    .upload-area:hover { border-color: var(--border-strong); }
    .upload-text { font-size: 14px; color: var(--text-secondary); font-weight: 500; }
    .upload-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 5px; }

    .image-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 10px; margin-top: 14px;
    }
    .image-grid-item { display: flex; flex-direction: column; }
    .image-item {
      position: relative; aspect-ratio: 1;
      border-radius: var(--radius-sm); overflow: hidden;
      border: 2px solid var(--border); cursor: pointer; transition: border-color 0.12s;
    }
    .image-item:hover { border-color: var(--border-strong); }
    .image-item.profile { border-color: var(--accent); border-width: 3px; }
    .image-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .img-badge {
      position: absolute; bottom: 4px; right: 4px;
      background: var(--accent); color: #fff;
      font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 4px;
    }
    .img-remove {
      position: absolute; top: 4px; left: 4px;
      border-radius: 50%; width: 22px; height: 22px;
      background: rgba(0,0,0,0.55); color: #fff;
      font-size: 14px; padding: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .img-remove:hover { background: rgba(0,0,0,0.8); opacity: 1; }

    .img-tag-row {
      display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px;
    }
    .img-tag-btn {
      font-size: 10px; padding: 3px 9px;
    }
    .img-tag-btn.active { background: var(--btn-fg); color: var(--btn-bg); }

    /* ── Submit ── */
    .submit-btn {
      width: 100%; padding: 16px 28px; margin-top: 16px;
      font-family: var(--font-heading); font-size: 16px; font-weight: 700;
      letter-spacing: 0.2px;
    }

    /* ── List toolbar ── */
    .list-toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 22px 24px 0; flex-wrap: wrap;
    }
    @media (max-width: 480px) { .list-toolbar { padding: 16px 18px 0; } }

    .toolbar-btn { padding: 8px 16px; font-size: 13px; }
    .toolbar-btn.active { background: var(--btn-fg); color: var(--btn-bg); }

    /* ── Apt list ── */
    .apt-list { display: flex; flex-direction: column; gap: 14px; padding: 16px 24px 80px; }
    @media (max-width: 480px) { .apt-list { padding: 14px 18px 64px; } }

    .apt-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
      display: flex; align-items: flex-start; gap: 16px;
      border-right: 4px solid transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: border-color 0.15s, box-shadow 0.2s ease, transform 0.2s ease;
    }
    .apt-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      transform: scale(1.02);
    }

    .apt-thumb {
      width: 116px; height: 116px; border-radius: var(--radius-sm);
      object-fit: cover; flex-shrink: 0; cursor: pointer; transition: opacity 0.12s;
    }
    .apt-thumb:hover { opacity: 0.88; }
    .apt-thumb-ph { width: 116px; height: 116px; border-radius: var(--radius-sm); background: var(--border); flex-shrink: 0; }

    .apt-info { flex: 1; min-width: 0; }

    .apt-name {
      font-size: 17px; font-weight: 700; color: var(--text);
      margin-bottom: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .apt-address-line {
      font-size: 13px; color: var(--text-secondary); margin-bottom: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .apt-meta { font-size: 12px; color: var(--text-tertiary); margin-bottom: 10px; }

    .apt-scores { display: flex; gap: 10px; margin-bottom: 10px; }

    .score-chip {
      display: flex; flex-direction: column; align-items: center;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-xs); padding: 5px 12px; min-width: 56px;
    }
    .score-chip-val { font-size: 17px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
    .score-chip-lbl { font-size: 10px; color: var(--text-tertiary); margin-top: 3px; letter-spacing: 0.2px; }

    .apt-actions { display: flex; flex-wrap: wrap; gap: 6px; }

    .action-btn {
      padding: 6px 14px; font-size: 13px;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .action-btn.danger { color: var(--red); }
    .action-btn.danger:hover { background: var(--red); color: #fff; opacity: 1; }
    .action-btn.fav-on { color: var(--amber); }

    /* ── Compact apt cards (כל הדירות) ── */
    .rank-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px 0;
      display: flex; flex-direction: column;
      border-right: 4px solid transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: border-color 0.15s, box-shadow 0.2s ease, transform 0.2s ease;
    }
    .rank-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); transform: scale(1.02); }

    .apt-card-row {
      display: flex; align-items: flex-start; gap: 12px; padding-bottom: 10px;
    }

    .apt-thumb-sm {
      width: 60px; height: 60px; border-radius: var(--radius-sm);
      object-fit: cover; flex-shrink: 0; cursor: pointer; transition: opacity 0.12s;
    }
    .apt-thumb-sm:hover { opacity: 0.88; }
    .apt-thumb-ph-sm { width: 60px; height: 60px; border-radius: var(--radius-sm); background: var(--border); flex-shrink: 0; }

    .rank-info { flex: 1; min-width: 0; }

    .apt-name-row {
      display: flex; align-items: baseline; gap: 6px;
      flex-wrap: wrap; margin-bottom: 3px;
    }

    .rank-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.4; }

    .apt-scores-inline { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }

    .apt-score-val { font-family: var(--font-heading); font-size: 13px; font-weight: 800; line-height: 1; }
    .apt-score-sep { color: var(--text-tertiary); font-size: 10px; }

    .rank-addr { font-size: 13px; color: var(--text-secondary); margin-bottom: 2px; line-height: 1.4; }

    /* ── Map ── */

    /* ── Compare ── */

    .compare-col { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .compare-col-img { width: 100%; height: 160px; object-fit: cover; display: block; }

    .photo-compare-section {
      margin-top: 24px;
      background: var(--surface); border: 1px solid var(--border);

    }
    .photo-compare-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

    /* ── Settings ── */
    .settings-screen { padding: 24px 24px 80px; }
    @media (max-width: 480px) { .settings-screen { padding: 18px 18px 64px; } }

    .settings-section {
      background: var(--surface); border: 1px solid var(--border);

    }
    .settings-row {
      display: flex; align-items: center; gap: 12px;

    .settings-total { font-size: 15px; font-weight: 600; margin-top: 20px; text-align: center; }
    .settings-total.ok { color: var(--green); }

    .settings-save-btn {
      width: 100%; padding: 15px 28px; margin-top: 14px;

    }
    .settings-reset-btn {
      width: 100%; padding: 12px 28px; margin-top: 10px;

    /* ── Fav badge ── */
    .fav-badge {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 2px 7px; border-radius: 4px;
      background: #fff8e6; color: var(--amber); border: 1px solid #f0d8a0; margin-left: 6px;
    }

    /* ── Profile screen ── */
    .profile-screen { padding: 0 0 64px; }

    .profile-hero {
      width: 100%; height: 300px; overflow: hidden; background: var(--border);

    }

    /* ── Score circle ── */

    /* ── Param bar ── */
    .param-bar-wrap { display: flex; align-items: center; gap: 12px; }

    .param-bar-fill { height: 100%; border-radius: 2px; transition: width 0.35s ease; }
    .param-bar-fill.score-green { background: var(--green); }
    .param-bar-fill.score-amber { background: var(--amber); }
    .param-bar-fill.score-red   { background: var(--red); }

    .profile-body { padding: 28px 24px 0; }

    .profile-name {
      font-size: 26px; font-weight: 800; color: var(--text);
      letter-spacing: -0.5px; margin-bottom: 6px;
    }
    .profile-address {
      font-size: 15px; color: var(--text-secondary);
      margin-bottom: 24px; line-height: 1.5;

    .profile-scores {
      display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; align-items: center;
    }
    .profile-score-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px 24px;
      text-align: center; flex: 1; min-width: 84px;
    }
    .profile-score-num { font-size: 30px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
    .profile-score-lbl { font-size: 11px; color: var(--text-tertiary); margin-top: 5px; }

    .profile-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px 24px; margin-bottom: 16px;
    }

    .profile-detail-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 15px;
    }

  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  // ── Constants ──────────────────────────────────────────────────
  const DEFAULT_WEIGHTS     = { roommatesQuality: 35, roomAvg: 35, location: 20, roommatesCount: 10 };
  const DEFAULT_VFM_WEIGHTS = { aptScore: 50, price: 50 };
  const DEFAULT_CNT_SCORES  = { 1: 5, 2: 4, 3: 5, 4: 3 };

  const ROOM_TAGS = [
    { value: '',         label: 'כללי' },
    { value: 'bedroom',  label: 'חדר' },
    { value: 'living',   label: 'סלון ומרפסת' },
    { value: 'kitchen',  label: 'מטבח' },
  ];

  // ── Utilities ──────────────────────────────────────────────────
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

  function calcScore(a, w, cntScores) {
    const weights = w || DEFAULT_WEIGHTS;
    const total = weights.roommatesQuality + weights.roomAvg + weights.location + weights.roommatesCount;
    if (!total) return 0;
    const roomAvg = ((a.room || 0) + (a.living || 0) + (a.kitchen || 0)) / 3;
    const cs = cntScores || DEFAULT_CNT_SCORES;
    const cntScore = cs[a.roommatesCount] ?? 3;
    return (
      (weights.roommatesQuality / total) * (a.roommatesQuality || 0) +
      (weights.roomAvg         / total) * roomAvg +
      (weights.location        / total) * (a.location || 0) +
      (weights.roommatesCount  / total) * cntScore
    );
  }

  function calcPriceScore(apt) {
    const p = +(apt.price) || 0;
    if (p <= 0) return null;
    if (p < 900 || p > 2100) return null;
    if (p <= 1100) return 5;
    if (p <= 1300) return 4;
    if (p <= 1600) return 3;
    if (p <= 1800) return 2;
    return 1;
  }

  function calcVfM(apt, allApts, weights, vfmW, cntScores) {
    const aptScore   = calcScore(apt, weights, cntScores);
    const priceScore = calcPriceScore(apt);
    if (priceScore === null) return aptScore;
    const vw    = vfmW || DEFAULT_VFM_WEIGHTS;
    const total = vw.aptScore + vw.price;
    if (!total) return aptScore;
    return (vw.aptScore / total) * aptScore + (vw.price / total) * priceScore;
  }

  function scoreClass(s) {
    if (s >= 4) return 'score-green';
    if (s >= 3) return 'score-amber';
    return 'score-red';
  }

  function borderClass(s) {
    if (s >= 4) return 'border-green';
    if (s >= 3) return 'border-amber';
    return 'border-red';
  }

  function fmtDate(ts) {
    return new Date(ts).toLocaleDateString('he-IL', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function fmtDateTime(ts) {
    return new Date(ts).toLocaleString('he-IL', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function fmtPrice(p) {
    const n = +(p) || 0;
    if (!n) return '';
    return '₪' + n.toLocaleString('he-IL');
  }

  function fullAddress(apt) {
    if (apt.street || apt.city) return [apt.street, apt.city].filter(Boolean).join(', ');
    return apt.address || '';
  }

  function getGreeting() {
    const h = new Date().getHours();
    if (h >= 5 && h < 12)  return 'בוקר טוב,';
    if (h >= 12 && h < 20) return 'צהריים טובים,';
    return 'ערב טוב,';
  }

  function getHebrewDate() {
    return new Date().toLocaleDateString('he-IL', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
    });
  }

  function compressImage(file) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const MAX = 900;
          let w = img.width, h = img.height;
          if (w > h) { if (w > MAX) { h = (h * MAX) / w; w = MAX; } }
          else        { if (h > MAX) { w = (w * MAX) / h; h = MAX; } }
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(c.toDataURL('image/jpeg', 0.75));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function loadApts() {
    try {
      const raw = JSON.parse(localStorage.getItem('apts') || '[]');
      return raw.map(a => {
        const apt = { name: '', price: '', favorite: false, notes: '', visitDate: '', history: [], imageTags: [], city: '', street: '', ...a };
        if (!apt.city && !apt.street && apt.address) apt.street = apt.address;
        const imgLen = (apt.images || []).length;
        while (apt.imageTags.length < imgLen) apt.imageTags.push('');
        return apt;
      });
    } catch { return []; }
  }

  function saveApts(list) {
    try { localStorage.setItem('apts', JSON.stringify(list)); }
    catch { alert('שגיאה בשמירה — ייתכן שנגמר המקום בדפדפן.'); }
  }

  function loadSettings() {
    try {
      const stored = JSON.parse(localStorage.getItem('apt-settings') || '{}');
      return {
        weights:    { ...DEFAULT_WEIGHTS,    ...(stored.weights    || {}) },
        vfmWeights: { ...DEFAULT_VFM_WEIGHTS,...(stored.vfmWeights || {}) },
        cntScores:  { ...DEFAULT_CNT_SCORES, ...(stored.cntScores  || {}) },
      };
    } catch { return { weights: { ...DEFAULT_WEIGHTS }, vfmWeights: { ...DEFAULT_VFM_WEIGHTS }, cntScores: { ...DEFAULT_CNT_SCORES } }; }
  }

  function saveSettings(s) { localStorage.setItem('apt-settings', JSON.stringify(s)); }

  const HISTORY_FIELDS = {
    name: 'שם', address: 'כתובת', price: 'מחיר',
    room: 'חדר', living: 'סלון + מרפסת', kitchen: 'מטבח',
    location: 'מיקום', roommatesCount: 'מספר דיירים', roommatesQuality: 'איכות דיירים',
    notes: 'הערות', visitDate: 'תאריך ביקור',
  };

  function trackHistory(prev, next) {
    const changes = {};
    for (const [key, label] of Object.entries(HISTORY_FIELDS)) {
      const a = String(prev[key] || ''), b = String(next[key] || '');
      if (a !== b) changes[label] = { from: a, to: b };
    }
    return Object.keys(changes).length > 0 ? changes : null;
  }

  function shareWhatsApp(apt, score, vfm) {
    const price  = apt.price > 0 ? `\nמחיר: ${fmtPrice(apt.price)}` : '';
    const visit  = apt.visitDate ? `\nתאריך ביקור: ${apt.visitDate}` : '';
    const notes  = apt.notes ? `\nהערות: ${apt.notes}` : '';
    const text =
      `${apt.name || fullAddress(apt)}` +
      (apt.name ? `\nכתובת: ${fullAddress(apt)}` : '') + price +
      `\nציון סופי: ${score.toFixed(2)}/5 | ערך לכסף: ${vfm.toFixed(2)}/5` +
      `\n---\nחדר: ${apt.room}/5 | סלון+מרפסת: ${apt.living}/5 | מטבח: ${apt.kitchen}/5` +
      `\nמיקום: ${apt.location}/5 | דיירים: ${apt.roommatesCount} | איכות: ${apt.roommatesQuality}/5` +
      visit + notes;
    window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
  }

  // ── Dark Mode ─────────────────────────────────────────────────
  const DarkModeContext = React.createContext({ dark: false, toggle: () => {} });

  function DarkModeProvider({ children }) {
    const [dark, setDark] = useState(() => localStorage.getItem('dark-mode') === 'true');
    useEffect(() => {
      document.documentElement.classList.toggle('dark', dark);
      localStorage.setItem('dark-mode', String(dark));
    }, [dark]);
    return (
      <DarkModeContext.Provider value={{ dark, toggle: () => setDark(d => !d) }}>
        {children}
      </DarkModeContext.Provider>
    );
  }

  // ── AppHeader ─────────────────────────────────────────────────
  function AppHeader({ title, onBack, onAdd, menuItems, onHome }) {
    const { dark, toggle } = React.useContext(DarkModeContext);

    const menuRef = useRef(null);

      function handler(e) {
        if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false);

      return () => document.removeEventListener('mousedown', handler);

    return (
      <header className="app-header">
        <div className="header-brand">
          <img src="Dirot2.png" className="app-logo" alt="Dirot"

                  <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                  <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>

                <div className="dropdown-menu">

  // ── ApartmentForm ─────────────────────────────────────────────
  function ApartmentForm({ initial, onSave }) {
    const fileRef = useRef(null);
    const [aptName,    setAptName]   = useState(initial?.name      || '');
    const [city,       setCity]      = useState(initial?.city      || '');
    const [street,     setStreet]    = useState(initial?.street    || '');
    const [price,      setPrice]     = useState(initial?.price     || '');
    const [images,     setImages]    = useState(initial?.images    || []);
    const [imageTags,  setImageTags] = useState(() => {
      const tags = [...(initial?.imageTags || [])];
      const imgs = initial?.images || [];
      while (tags.length < imgs.length) tags.push('');
      return tags;
    });
    const [profIdx,    setProfIdx]   = useState(initial?.profIdx   ?? 0);
    const [room,       setRoom]      = useState(initial?.room      || 0);
    const [living,     setLiving]    = useState(initial?.living    || 0);
    const [kitchen,    setKitchen]   = useState(initial?.kitchen   || 0);
    const [location,   setLocation]  = useState(initial?.location  || 0);
    const [rCount,     setRCount]    = useState(initial?.roommatesCount   || 3);
    const [rQual,      setRQual]     = useState(initial?.roommatesQuality || 0);
    const [notes,      setNotes]     = useState(initial?.notes     || '');
    const [visitDate,  setVisitDate] = useState(initial?.visitDate || '');

    const priceNum = +(price) || 0;
    const priceOutOfRange = priceNum > 0 && (priceNum < 900 || priceNum > 2100);

    async function handleFiles(e) {
      const files = Array.from(e.target.files);
      if (!files.length) return;
      const compressed = await Promise.all(files.map(compressImage));
      setImages(prev => [...prev, ...compressed]);
      setImageTags(prev => [...prev, ...compressed.map(() => '')]);
      e.target.value = '';
    }

    function removeImg(idx) {
      setImages(prev => {
        const next = prev.filter((_, i) => i !== idx);
        if (profIdx >= next.length) setProfIdx(Math.max(0, next.length - 1));
        return next;
      });
      setImageTags(prev => prev.filter((_, i) => i !== idx));
    }

    function setImageTag(idx, tag) {
      setImageTags(prev => prev.map((t, i) => i === idx ? tag : t));
    }

    function handleSubmit() {
      if (!aptName.trim()) { alert('נא להזין שם לדירה'); return; }
      if (!city.trim()) { alert('נא להזין עיר'); return; }
      if (!street.trim()) { alert('נא להזין רחוב ומספר'); return; }
      if (!room || !living || !kitchen || !location || !rQual) {
        alert('נא למלא את כל שדות הדירוג'); return;
      }
      onSave({ name: aptName.trim(), city: city.trim(), street: street.trim(), price: +(price) || 0,
               images, imageTags, profIdx, room, living, kitchen, location,
               roommatesCount: rCount, roommatesQuality: rQual, notes, visitDate });
    }

    return (
      <div className="form-screen screen">
        <div className="form-section stagger-item" style={{ '--stagger-delay': '0ms' }}>
          <div className="form-section-title">פרטי הדירה</div>

          <label className="form-label">שם הדירה <span className="req">*</span></label>
          <input className="form-input" type="text" placeholder='לדוגמה: "דירת הגן", "הפנטהאוז בדיזנגוף"'
            value={aptName} onChange={e => setAptName(e.target.value)} />
          <div className="spacer" />

          <label className="form-label">עיר <span className="req">*</span></label>
          <input className="form-input" type="text" placeholder="תל אביב, ירושלים, חיפה..."
            value={city} onChange={e => setCity(e.target.value)} />
          <div className="spacer" />

          <label className="form-label">רחוב ומספר <span className="req">*</span></label>
          <input className="form-input" type="text" placeholder="רחוב הרצל 15"
            value={street} onChange={e => setStreet(e.target.value)} />
          <div className="spacer" />

          <div className="form-row">
            <div>
              <label className="form-label">מחיר חודשי (₪)</label>
              <div className="price-wrap">
                <input className="form-input" type="number" min="0" placeholder="0"
                  value={price} onChange={e => setPrice(e.target.value)} />
                <span className="price-symbol">₪</span>
              </div>
              {priceOutOfRange && (
                <div className="price-warning">
                  המחיר מחוץ לטווח ₪900–₪2,100. ציון מחיר לא יחושב.
                </div>
              )}
            </div>
            <div>
              <label className="form-label">תאריך ביקור</label>
              <input className="form-input" type="date"
                value={visitDate} onChange={e => setVisitDate(e.target.value)} />
            </div>
          </div>

          <label className="form-label">הערות</label>
          <textarea className="form-textarea" placeholder="רשומות, מחשבות, דברים לבדוק..."
            value={notes} onChange={e => setNotes(e.target.value)} />
        </div>

        <div className="form-section stagger-item" style={{ '--stagger-delay': '65ms' }}>
          <div className="form-section-title">תמונות</div>
          <div className="upload-area" onClick={() => fileRef.current.click()}>
            <div className="upload-text">לחץ להוספת תמונות</div>
            <div className="upload-sub">לחץ על תמונה לבחירתה כפרופיל · בחר חדר לכל תמונה</div>
          </div>
          <input ref={fileRef} type="file" accept="image/*" multiple
            style={{ display: 'none' }} onChange={handleFiles} />
          {images.length > 0 && (
            <div className="image-grid">
              {images.map((src, i) => (
                <div key={i} className="image-grid-item">
                  <div className={'image-item' + (i === profIdx ? ' profile' : '')}
                    onClick={() => setProfIdx(i)}>
                    <img src={src} alt="" />
                    {i === profIdx && <div className="img-badge">פרופיל</div>}
                    <button className="img-remove" type="button"
                      onClick={e => { e.stopPropagation(); removeImg(i); }}>&times;</button>
                  </div>
                  <div className="img-tag-row">
                    {ROOM_TAGS.map(({ value, label }) => (
                      <button key={value} type="button"
                        className={'img-tag-btn' + ((imageTags[i] || '') === value ? ' active' : '')}
                        onClick={() => setImageTag(i, value)}>
                        {label}
                      </button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="form-section stagger-item" style={{ '--stagger-delay': '130ms' }}>
          <div className="form-section-title">דירוג</div>
          <RatingInput label="חדר"          value={room}     onChange={setRoom} />
          <RatingInput label="סלון + מרפסת" value={living}   onChange={setLiving} />
          <RatingInput label="מטבח"         value={kitchen}  onChange={setKitchen} />
          <RatingInput label="מיקום"        value={location} onChange={setLocation} />
        </div>

        <div className="form-section stagger-item" style={{ '--stagger-delay': '195ms' }}>
          <div className="form-section-title">דיירים</div>
          <label className="form-label">מספר דיירים</label>
          <div className="count-btns">
            {[1,2,3,4].map(n => (
              <button key={n} type="button"
                className={'count-btn' + (rCount === n ? ' active' : '')}
                onClick={() => setRCount(n)}>{n}</button>
            ))}
          </div>
          <div className="spacer" />
          <RatingInput label="איכות הדיירים" value={rQual} onChange={setRQual} />
        </div>

        <button className="submit-btn" onClick={handleSubmit}>שמור דירה</button>
      </div>
    );
  }

  // ── GalleryModal ──────────────────────────────────────────────
  function GalleryModal({ images, startIdx, onClose }) {
    const [idx, setIdx] = useState(startIdx || 0);
    useEffect(() => {
      function onKey(e) {
        if (e.key === 'ArrowLeft')  setIdx(i => (i + 1) % images.length);
        if (e.key === 'ArrowRight') setIdx(i => (i - 1 + images.length) % images.length);
        if (e.key === 'Escape') onClose();
      }
      window.addEventListener('keydown', onKey);
      return () => window.removeEventListener('keydown', onKey);
    }, [images.length, onClose]);

    return (
      <div className="gallery-overlay" onClick={onClose}>
        <button className="gallery-close-btn" onClick={onClose}>סגור</button>
        <img className="gallery-img" src={images[idx]} alt="" onClick={e => e.stopPropagation()} />
        {images.length > 1 && (
          <div className="gallery-controls" onClick={e => e.stopPropagation()}>
            <button className="gallery-btn" onClick={() => setIdx(i => (i - 1 + images.length) % images.length)}>&rsaquo;</button>
            <span className="gallery-counter">{idx + 1} / {images.length}</span>
            <button className="gallery-btn" onClick={() => setIdx(i => (i + 1) % images.length)}>&lsaquo;</button>
          </div>
        )}
      </div>
    );
  }

  // ── MapModal (single apt) ─────────────────────────────────────
  function MapModal({ apt, onClose }) {
    const mapRef = useRef(null);
    useEffect(() => {
      if (!mapRef.current) return;
      const map = L.map(mapRef.current).setView([31.7683, 35.2137], 10);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
      fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(fullAddress(apt))}&format=json&limit=1&accept-language=he`)
        .then(r => r.json())
        .then(data => {
          if (data && data.length > 0) {
            const { lat, lon } = data[0];
            map.setView([+lat, +lon], 16);
            L.marker([+lat, +lon]).addTo(map).bindPopup(apt.name || fullAddress(apt)).openPopup();
          }
        }).catch(() => {});
      return () => map.remove();
    }, [apt.address]);

    return (
      <div className="modal-overlay" onClick={onClose}>
        <div className="modal-box" style={{ maxWidth: 600, overflow: 'hidden' }} onClick={e => e.stopPropagation()}>
          <div className="modal-header">
            <span>{apt.name || fullAddress(apt)}</span>
            <button className="modal-close" onClick={onClose}>סגור</button>
          </div>
          <div ref={mapRef} className="map-container" />
        </div>
      </div>
    );
  }

  // ── AllApartmentsMapModal ─────────────────────────────────────
  function AllApartmentsMapModal({ apts, weights, vfmWeights, cntScores, onClose }) {
    const mapRef = useRef(null);
    useEffect(() => {
      if (!mapRef.current) return;
      const map = L.map(mapRef.current).setView([31.7683, 35.2137], 8);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
      let cancelled = false;
      async function geocodeAll() {
        for (const apt of apts) {
          if (cancelled) break;
          try {
            const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(fullAddress(apt))}&format=json&limit=1&accept-language=he`);
            const data = await r.json();
            if (cancelled) break;
            if (data && data.length > 0) {
              const { lat, lon } = data[0];
              const score = calcScore(apt, weights, cntScores);
              const vfm   = calcVfM(apt, apts, weights, vfmWeights, cntScores);
              L.marker([+lat, +lon]).addTo(map)
                .bindPopup(`<b>${apt.name || fullAddress(apt)}</b><br>ציון: ${score.toFixed(2)} | ערך לכסף: ${vfm.toFixed(2)}`);
            }
          } catch {}
          await new Promise(res => setTimeout(res, 700));
        }
      }
      geocodeAll();
      return () => { cancelled = true; map.remove(); };
    }, []);

    return (
      <div className="modal-overlay" onClick={onClose}>
        <div className="modal-box" style={{ maxWidth: 700, overflow: 'hidden' }} onClick={e => e.stopPropagation()}>
          <div className="modal-header">
            <span>כל הדירות על המפה</span>
            <button className="modal-close" onClick={onClose}>סגור</button>
          </div>
          <div ref={mapRef} style={{ height: 480, borderRadius: '0 0 var(--radius) var(--radius)', overflow: 'hidden' }} />
        </div>
      </div>
    );
  }

  // ── PhotoCompareModal ─────────────────────────────────────────
  function PhotoCompareModal({ aptA, aptB, param, paramLabel, field, onClose }) {
    const imgsA = (aptA.images || []).filter((_, i) => (aptA.imageTags || [])[i] === param);
    const imgsB = (aptB.images || []).filter((_, i) => (aptB.imageTags || [])[i] === param);
    const scoreA = aptA[field] || 0;
    const scoreB = aptB[field] || 0;

    return (
      <div className="modal-overlay" onClick={onClose} style={{ zIndex: 1100 }}>
        <div className="modal-box" style={{ maxWidth: 680 }} onClick={e => e.stopPropagation()}>
          <div className="modal-header">
            <span>השוואת {paramLabel}</span>
            <button className="modal-close" onClick={onClose}>סגור</button>
          </div>
          <div className="modal-body">
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
              {[{ apt: aptA, imgs: imgsA, score: scoreA }, { apt: aptB, imgs: imgsB, score: scoreB }].map(({ apt, imgs, score }, idx) => (
                <div key={idx}>
                  <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 6, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                    {apt.name || fullAddress(apt)}
                  </div>
                  <div className={'rank-score-num ' + scoreClass(score)} style={{ fontSize: 30, marginBottom: 12 }}>
                    {score}/5
                  </div>
                  {imgs.length === 0
                    ? <div style={{ color: 'var(--text-tertiary)', fontSize: 13, padding: '12px 0' }}>אין תמונות עם תג זה</div>
                    : imgs.map((src, j) => (
                        <img key={j} src={src} alt="" style={{ width: '100%', borderRadius: 8, marginBottom: 8, objectFit: 'cover', height: 150, display: 'block' }} />
                      ))
                  }
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── SettingsScreen ────────────────────────────────────────────
  function SettingsScreen({ settings, onSave, onBack, navDir, onHome }) {
    const [w,   setW]   = useState({ ...settings.weights });
    const [vfm, setVfm] = useState({ ...settings.vfmWeights });
    const [cnt, setCnt] = useState({ ...settings.cntScores });

    const wTotal   = Object.values(w).reduce((s, v) => s + (+v || 0), 0);
    const vfmTotal = (+vfm.aptScore || 0) + (+vfm.price || 0);
    const wOk  = wTotal   === 100;
    const vOk  = vfmTotal === 100;
    const canSave = wOk && vOk;

    const weightRows = [
      ['roommatesQuality', 'איכות דיירים'],
      ['roomAvg',          'ממוצע חדרים (חדר + סלון + מטבח)'],
      ['location',         'מיקום'],
      ['roommatesCount',   'כמות דיירים'],
    ];

    const cntRows = [
      [1, '1 דייר'],
      [2, '2 דיירים'],
      [3, '3 דיירים'],
      [4, '4 דיירים'],
    ];

    return (
      <div className={'app slide-' + (navDir || 'forward')}>
        <AppHeader title="הגדרות" onBack={onBack} onHome={onHome} />
        <div className="settings-screen screen">
          <div className="settings-section">
            <div className="form-section-title">משקל פרמטרים — ציון הדירה</div>
            {weightRows.map(([key, label]) => (
              <div key={key} className="settings-row">
                <span className="settings-label">{label}</span>
                <input className="settings-input" type="number" min="0" max="100"
                  value={w[key]} onChange={e => setW(prev => ({ ...prev, [key]: +e.target.value || 0 }))} />
                <span className="settings-pct">%</span>
              </div>
            ))}
            <div className={'settings-total ' + (wOk ? 'ok' : 'err')}>
              סה"כ: {wTotal}% {wOk ? '(תקין)' : '(חייב להיות 100%)'}
            </div>
          </div>

          <div className="settings-section">
            <div className="form-section-title">משקל מרכיבים — ערך לכסף</div>
            <div className="settings-row">
              <span className="settings-label">ציון הדירה</span>
              <input className="settings-input" type="number" min="0" max="100"
                value={vfm.aptScore}
                onChange={e => setVfm(prev => ({ ...prev, aptScore: +e.target.value || 0 }))} />
              <span className="settings-pct">%</span>
            </div>
            <div className="settings-row">
              <span className="settings-label">ציון מחיר</span>
              <input className="settings-input" type="number" min="0" max="100"
                value={vfm.price}
                onChange={e => setVfm(prev => ({ ...prev, price: +e.target.value || 0 }))} />
              <span className="settings-pct">%</span>
            </div>
            <div className={'settings-total ' + (vOk ? 'ok' : 'err')}>
              סה"כ: {vfmTotal}% {vOk ? '(תקין)' : '(חייב להיות 100%)'}
            </div>
          </div>

          <div className="settings-section">
            <div className="form-section-title">ציון לפי מספר דיירים</div>
            {cntRows.map(([n, label]) => (
              <div key={n} className="settings-row">
                <span className="settings-label">{label}</span>
                <input className="settings-input" type="number" min="0" max="5" step="0.5"
                  value={cnt[n] ?? ''}
                  onChange={e => setCnt(prev => ({ ...prev, [n]: +e.target.value || 0 }))} />
                <span className="settings-pct" style={{ width: 24 }}>/5</span>
              </div>
            ))}
          </div>

          <button className="settings-save-btn" disabled={!canSave}
            onClick={() => onSave({ weights: w, vfmWeights: vfm, cntScores: cnt })}>
            שמור הגדרות
          </button>
          <button className="settings-reset-btn"
            onClick={() => { setW({ ...DEFAULT_WEIGHTS }); setVfm({ ...DEFAULT_VFM_WEIGHTS }); setCnt({ ...DEFAULT_CNT_SCORES }); }}>
            איפוס לברירת מחדל
          </button>
        </div>
      </div>
    );
  }
